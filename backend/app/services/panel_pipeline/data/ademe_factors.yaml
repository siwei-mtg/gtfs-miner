# ADEME Base Carbone v23+ (2026 release) emission factors per route_type.
# Unit: kgCO2 per vehicle-km. Per spec §5.1 H, treat as order-of-magnitude:
#   ±30% for diesel-dominant networks (mostly buses)
#   ±50% for mixed/electric networks (tram + metro)
# UI MUST display "Estimation order-of-magnitude — not for legal GHG reporting"
# alongside the value.
#
# Sources:
#   bus diesel:    ADEME 2024 fleet average (~1.0-1.3 kgCO2/seat-km × 80 seats × 1.4 km/passenger-km adjustment)
#   tram/metro:    French electric grid 0.06 kgCO2/kWh × ~75 kWh/vehicle-km
#   train:         mix urban/regional electric + TER diesel
#
# Values are intentionally conservative; refine after Cerema review (Plan 4 W13).
factors_kg_co2_per_km:
  0: 4.5     # tram (electric)
  1: 4.5     # metro
  2: 8.0     # train (mix)
  3: 110.0   # bus (diesel-dominant)
  4: 280.0   # ferry
  5: 8.0     # cable
  6: 8.0     # telephe
  7: 4.5     # funiculaire
  11: 8.0    # trolley
  12: 4.5    # monorail

default: 110.0   # unknown route_type → assume diesel bus

source: "ADEME Base Carbone v23+, accessed 2026-Q1"
methodology_doc: "https://github.com/compare-transit/methodology/blob/main/co2_methodology.md"
