# Initial provisional cuts. Refined by D6 (Task 1.3).
# Logic in detect_reorg(): j = min(stop_jaccard, route_jaccard)
#   j >= minor_min                   → no reorg
#   j ∈ [major_min,  minor_min)      → minor
#   j ∈ [massive_min, major_min)     → major
#   j <  massive_min                 → massive
version: v1-provisional
minor_min: 0.85
major_min: 0.70
massive_min: 0.50
